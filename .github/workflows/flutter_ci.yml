name: Flutter CI

on:
  push:
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Warnings and errors fail the build; infos (style/deprecations) are non-fatal until cleaned up.
      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test
