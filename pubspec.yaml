name: omr_app
description: OMR Scanner App for Cagayan de Oro College
publish_to: "none"
version: 1.1.6+8

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # Camera & Image Processing
  camera: ^0.10.5
  image_picker: ^1.0.5
  image: ^4.1.3  # For image compression on low-end devices

  # File Handling
  file_picker: ^8.0.0
  csv: ^5.1.1
  excel: ^2.0.0

  # PDF Generation
  barcode: ^2.2.9
  pdf: ^3.10.7
  printing: ^5.11.1

  # Utilities
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  permission_handler: ^11.0.1
  connectivity_plus: ^6.1.4

  # Local Storage (offline-first: SQLite on device)
  path: ^1.9.0
  crypto: ^3.0.3
  shared_preferences: ^2.2.2
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3

  # Supabase backend
  supabase_flutter: ^2.12.0
  sentry_flutter: ^8.14.2

  # App metadata (version/build for update check)
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/app_icon.png
  adaptive_icon_background: "#1F6B4F"
  adaptive_icon_foreground: assets/app_icon.png

flutter:
  uses-material-design: true

  assets:
    - assets/app_icon.png
    - assets/app_icon_source.png
    - assets/coc_seal.png
    - assets/logo.png
    - assets/placeholder.png
